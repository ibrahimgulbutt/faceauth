<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Deep navy to indigo background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f3d"/>
      <stop offset="100%" stop-color="#2d2060"/>
    </linearGradient>
    <!-- Cyan accent used on scan lines and face outline -->
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0080ff" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Subtle face fill -->
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="22" ry="22" fill="url(#bg)"/>

  <!-- ── Corner scan-brackets ────────────────────────────────────────────── -->
  <g stroke="url(#glow)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.9">
    <!-- top-left -->
    <polyline points="18,34 18,18 34,18"/>
    <!-- top-right -->
    <polyline points="94,18 110,18 110,34"/>
    <!-- bottom-left -->
    <polyline points="18,94 18,110 34,110"/>
    <!-- bottom-right -->
    <polyline points="110,94 110,110 94,110"/>
  </g>

  <!-- ── Face silhouette (oval head) ──────────────────────────────────────── -->
  <ellipse cx="64" cy="56" rx="23" ry="28"
           fill="url(#face)" stroke="url(#glow)" stroke-width="2" opacity="0.85"
           filter="url(#blur-glow)"/>

  <!-- ── Facial feature dots (eyes) ──────────────────────────────────────── -->
  <circle cx="55" cy="50" r="2.5" fill="#00e5ff" opacity="0.9"/>
  <circle cx="73" cy="50" r="2.5" fill="#00e5ff" opacity="0.9"/>

  <!-- ── Minimal smile arc ────────────────────────────────────────────────── -->
  <path d="M 57 61 Q 64 67 71 61" stroke="#00e5ff" stroke-width="2"
        stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- ── Horizontal scan line sweeping across the face ───────────────────── -->
  <line x1="38" y1="56" x2="90" y2="56"
        stroke="#00e5ff" stroke-width="1.5" opacity="0.45" stroke-dasharray="4 3"/>

  <!-- ── Lock-on reticle: small crosshair at center ──────────────────────── -->
  <g stroke="#00e5ff" stroke-width="1.5" opacity="0.55" stroke-linecap="round">
    <line x1="64" y1="30" x2="64" y2="36"/>
    <line x1="64" y1="76" x2="64" y2="82"/>
    <line x1="34" y1="56" x2="40" y2="56"/>
    <line x1="88" y1="56" x2="94" y2="56"/>
  </g>

  <!-- ── Verified checkmark at bottom-right ───────────────────────────────── -->
  <circle cx="93" cy="93" r="12" fill="#0080ff" opacity="0.95"/>
  <polyline points="86,93 91,98 100,87"
            stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"
            stroke-linejoin="round" fill="none"/>
</svg>
